  <main class="formulario">

    <section id="contacto" class="contacto">
      <h2 class="contacto__title">Contáctame</h2>
      
      <form id="formulario-contacto" class="form contenido">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

        <div class="contenido__botones">
          <button type="submit"><i class="fas fa-paper-plane"></i> Enviar</button>
          <button type="reset"><i class="fas fa-eraser"></i> Limpiar</button>
        </div>
      </form>

      <div id="mensaje-confirmacion" class="oculto">
        <p>¡Gracias por escribirme! 💌</p>
      </div>
    </section>
  </main>
